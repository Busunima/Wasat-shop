# CI-пайплайн (ТЗ §14, §15). Полный поток до релиза наполняется по фазам:
# lint -> unit -> build -> deploy staging -> E2E -> promote prod.
# Этот этап: реальные lint/unit/build для server и android с path-фильтрами по каталогам.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read # нужно dorny/paths-filter для PR API listFiles

jobs:
  changes:
    name: Определить изменённые компоненты
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      server: ${{ steps.filter.outputs.server }}
      admin-web: ${{ steps.filter.outputs.admin-web }}
      firebase: ${{ steps.filter.outputs.firebase }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'android/**'
            server:
              - 'server/**'
            admin-web:
              - 'admin-web/**'
            firebase:
              - 'firebase/**'

  server:
    name: Server · lint + test + build
    needs: changes
    if: ${{ needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  android:
    name: Android · lint + unit + build
    needs: changes
    if: ${{ needs.changes.outputs.android == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      # Kotlin поддерживает ВЛОЖЕННЫЕ блочные комментарии: «/*» внутри KDoc
      # (например, путь «.../inventory/*») съедает остаток файла (Unclosed comment).
      - name: Гард — вложенный /* в Kotlin-комментариях
        run: |
          if grep -rnE --include='*.kt' '^\s*(/\*\*|\*)([^/]|/[^*])*/\*' app/src; then
            echo '::error::Найден вложенный /* внутри Kotlin-комментария (Unclosed comment)'; exit 1
          fi
      - run: ./gradlew lintDebug testDebugUnitTest assembleDebug
      # TODO(Фаза 1): добавить статанализ ktlint + detekt (ТЗ §14) отдельными задачами.

  admin-web:
    name: Admin Web · lint + build
    needs: changes
    if: ${{ needs.changes.outputs.admin-web == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      # Сборка без секретов (VITE_* пустые) — приложение собирается, рантайм гейтится.
      - run: npm run build

  security:
    name: Security · аудит зависимостей (§14)
    # Гейт безопасности на каждом PR/пуше (не зависит от path-фильтра).
    # ТЗ §14: 0 critical CVE — гейтим по critical в prod-зависимостях; moderate/high
    # остаются информационными в логе и не валят сборку.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: npm audit — server (0 critical CVE)
        working-directory: server
        run: npm audit --omit=dev --audit-level=critical
      - name: npm audit — admin-web (0 critical CVE)
        working-directory: admin-web
        run: npm audit --omit=dev --audit-level=critical

  emulator:
    name: Firebase Emulator · rules + server integration
    needs: changes
    # Эмуляторные тесты затрагивают и правила (firebase/), и серверную интеграцию (server/).
    if: ${{ needs.changes.outputs.firebase == 'true' || needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm install -g firebase-tools
      # Тесты Firestore Security Rules (firebase/firestore.rules, ТЗ §4.3)
      - run: npm ci
        working-directory: firebase
      - run: npm run test:emulator
        working-directory: firebase
      # Интеграция createStore против эмуляторов Firestore + Auth (POST /api/stores/init)
      - run: npm ci
        working-directory: server
      - run: npm run test:integration
        working-directory: server

  android-ui:
    name: Android · UI-тесты (instrumentation)
    needs: changes
    if: ${{ needs.changes.outputs.android == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      # Аппаратное ускорение KVM для эмулятора Android на ubuntu-раннере.
      - name: Включить KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # Compose UI-тесты критических флоу (connectedDebugAndroidTest) на эмуляторе.
      - name: UI-тесты на эмуляторе
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          working-directory: android
          script: ./gradlew connectedDebugAndroidTest
